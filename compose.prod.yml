services:
  db:
    image: postgres:17-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-prod
    networks:
      - frontend-net
    restart: always
  
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
      target: runner
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
    env_file: .env
    networks:
      - backend-net
    restart: always
  
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
      target: runner
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
    env_file: .env
    networks:
      - frontend-net
      - backend-net
    restart: always




volumes:
  pgdata:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridg